spring.application.name=Club-Deportivo-Dev

# definimos un puerto y una URL para entrar con swagger
server.port=${SERVER_PORT_TEST}

# agregamos los datos para la conexion
spring.datasource.url=${DATABASE_URL_DEV}
spring.datasource.username=${DATABASE_USER_DEV}
spring.datasource.password=${DATABASE_PASSWORD_DEV}

# agregamos configuraciones de hibernate para ver en terminal
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# visualizamos las querys al momento de la realizacion de la peticion
spring.jpa.properties.hibernate.format_sql=true

# agregamos el volumen para manejar tanto videos como fotos
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# Logging Configuration
logging.level.com.safiraenergia.mercadospot=DEBUG
logging.level.org.springframework.security=INFO 
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# File logging
logging.file.name=${LOGGING_FILE_NAME}
logging.file.max-size=100MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} - %msg%n

# Archivo específico para errores de ETL
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

# HikariCP configuration for better connection handling
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.register-mbeans=true
spring.datasource.hikari.auto-commit=false

# Hibernate configuration
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Configuracion para monitoreo del Garbage Collector
management.endpoints.web.exposure.include=health,info,metrics,gc
management.metrics.enable.jvm.gc=true
management.endpoint.metrics.enabled=true

# Log para el Garbage Collector
logging.level.com.clubdeportivo.config.GarbageCollectorMonitoringConfig=DEBUG